---
apiVersion: apps/v1
kind: Deployment
metadata:
 name: productsapideployment
spec:
 replicas: 1
 selector:
   matchLabels:
     app: products
 template:
  metadata:
   name: products
   labels:
     app: products
  spec:
    containers:
    - name: productscontainer
      image: pradeepsuresh/maven-e-com-web-app
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"
      ports:
      - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
 name: productssvc
spec:
  type: LoadBalancer
  selector:
   app: products
  ports:
   - port: 80
     targetPort: 8080
...
